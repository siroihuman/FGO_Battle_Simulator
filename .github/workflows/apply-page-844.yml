name: Apply Page 844 Implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'implement-page-844'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement-page-844
          fetch-depth: 0
      - name: Apply implementation and remove temporary files
        env:
          ARCHIVE_SHA256: 743c3c0dea9fa1b2b4e778131b4856c846d4dadaa02817019fbcb9fe7fd7882a
        run: |
          cat > /tmp/baphomet-implementation.b64 <<'ARCHIVE'
[... ELLIPSIZATION ...]
ARCHIVE
          base64 --decode /tmp/baphomet-implementation.b64 > /tmp/baphomet-implementation.tar.gz
          echo "$ARCHIVE_SHA256  /tmp/baphomet-implementation.tar.gz" | sha256sum -c -
          tar -xzf /tmp/baphomet-implementation.tar.gz -C .
          rm -f .github/workflows/fetch-page-844.yml
          rm -f .github/workflows/apply-page-844.yml
          rm -f tmp/page844-audit-trigger.txt
          rmdir tmp 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement Baphomet servant mechanics"
          git push origin HEAD:implement-page-844
