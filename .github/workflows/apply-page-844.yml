name: Apply Page 844 Implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'implement-page-844'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement-page-844
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply Baphomet data and integrations
        run: node tmp/apply-baphomet-data.js
      - name: Syntax check
        run: |
          find js tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: node tests/run-all.js
      - name: Remove temporary implementation files
        run: |
          rm -f .github/workflows/fetch-page-844.yml
          rm -f .github/workflows/apply-page-844.yml
          rm -f tmp/page844-audit-trigger.txt
          rm -f tmp/apply-baphomet-data.js
          rm -f tmp/baphomet-implementation.part*
          rmdir tmp 2>/dev/null || true
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Implement Baphomet servant mechanics'
          git push origin HEAD:implement-page-844
