name: Fetch atwiki page 795

on:
  push:
    branches:
      - implement-servant-page-795
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rendered page through reader
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 --user-agent 'Mozilla/5.0' \
            'https://r.jina.ai/https://w.atwiki.jp/siroi_human/pages/795.html' \
            -o page-795.txt
          curl -L --fail --retry 3 --user-agent 'Mozilla/5.0' \
            'https://r.jina.ai/https://w.atwiki.jp/siroi_human/?cmd=backup&action=source&pageid=795&num=0' \
            -o page-795-source.txt
      - name: Upload fetched page
        uses: actions/upload-artifact@v4
        with:
          name: atwiki-page-795
          path: |
            page-795.txt
            page-795-source.txt
          if-no-files-found: error
