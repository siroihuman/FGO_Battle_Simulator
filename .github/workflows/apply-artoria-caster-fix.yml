name: Apply Artoria Caster Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-artoria-caster-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply and verify
        shell: bash
        run: |
          set +e
          : > artoria-caster-verification.log
          echo '=== Servant migration ===' >> artoria-caster-verification.log
          node scripts/apply-artoria-caster-fix.js >> artoria-caster-verification.log 2>&1
          status=$?
          echo "migration_status=$status" >> artoria-caster-verification.log

          echo '=== Common test isolation ===' >> artoria-caster-verification.log
          node scripts/fix-defense-test-isolation.js >> artoria-caster-verification.log 2>&1
          isolation_status=$?
          echo "isolation_status=$isolation_status" >> artoria-caster-verification.log
          if [ "$isolation_status" -ne 0 ]; then status=1; fi

          echo '=== Syntax check ===' >> artoria-caster-verification.log
          find js tests -name '*.js' -print0 | xargs -0 -n1 node --check >> artoria-caster-verification.log 2>&1
          syntax_status=$?
          echo "syntax_status=$syntax_status" >> artoria-caster-verification.log
          if [ "$syntax_status" -ne 0 ]; then status=1; fi

          echo '=== Regression tests ===' >> artoria-caster-verification.log
          for file in tests/*-tests.js; do
            echo "=== $file ===" >> artoria-caster-verification.log
            node "$file" >> artoria-caster-verification.log 2>&1
            test_status=$?
            if [ "$test_status" -ne 0 ]; then status=1; fi
          done
          echo "verification_status=$status" >> artoria-caster-verification.log
          echo "$status" > /tmp/artoria-status
      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          status=$(cat /tmp/artoria-status)
          if [ "$status" -eq 0 ]; then
            git add js/servants.js tests/artoria-caster-tests.js tests/defense-resistance-effects-tests.js
            git rm scripts/apply-artoria-caster-fix.js scripts/fix-defense-test-isolation.js .github/workflows/apply-artoria-caster-fix.yml artoria-caster-verification.log
            git commit -m "Fix Artoria Caster servant data"
          else
            git add artoria-caster-verification.log
            git commit -m "Record Artoria Caster verification failure"
          fi
          git push origin main

# Merge-triggered verification after generic test isolation.
