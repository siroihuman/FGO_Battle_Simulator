name: Debug Rlyeh

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  debug:
    if: github.head_ref == 'implement-rlyeh'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply pending patch
        run: python tmp/apply-rlyeh-ui.py
      - name: Capture test output
        run: node tests/rlyeh-tests.js > rlyeh-debug.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: rlyeh-debug
          path: rlyeh-debug.log
