name: Fetch Page 815 Archive

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fetch:
    if: github.head_ref == 'implement-page-815'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Query Wayback and alternate endpoints
        run: |
          mkdir -p page815-archive
          curl -L --retry 3 --max-time 60 -A 'Mozilla/5.0' 'https://web.archive.org/cdx/search/cdx?url=w.atwiki.jp%2Fsiroi_human%2Fpages%2F815.html&output=json&fl=timestamp,original,statuscode,mimetype&filter=statuscode:200&limit=-10' -o page815-archive/cdx.json || true
          curl -L --retry 3 --max-time 60 -A 'Mozilla/5.0' 'https://archive.org/wayback/available?url=https%3A%2F%2Fw.atwiki.jp%2Fsiroi_human%2Fpages%2F815.html' -o page815-archive/available.json || true
          curl -L --retry 3 --max-time 60 -A 'Mozilla/5.0' 'https://w.atwiki.jp/siroi_human/sitemap.xml' -o page815-archive/sitemap.xml || true
          curl -L --retry 3 --max-time 60 -A 'Mozilla/5.0' 'https://w.atwiki.jp/siroi_human/pages/815.html?pc_mode=1' -o page815-archive/pc-mode.html || true
          python - <<'PY'
          import json, pathlib, urllib.request
          p = pathlib.Path('page815-archive')
          try:
              data = json.loads((p/'cdx.json').read_text())
              rows = data[1:] if isinstance(data, list) and data else []
              if rows:
                  ts, original = rows[-1][0], rows[-1][1]
                  url = f'https://web.archive.org/web/{ts}id_/{original}'
                  req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=90) as r:
                      (p/'snapshot.html').write_bytes(r.read())
                  (p/'snapshot-url.txt').write_text(url)
          except Exception as e:
              (p/'snapshot-error.txt').write_text(repr(e))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: page-815-archive
          path: page815-archive
