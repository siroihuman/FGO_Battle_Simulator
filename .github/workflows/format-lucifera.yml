name: Format Lucifera

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-and-test:
    if: github.head_ref == 'implement-lucifera'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Format Lucifera definition
        run: python .github/format-lucifera.py

      - name: Check all JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find js tests -type f -name '*.js' -print0 | sort -z)

      - name: Run all regression tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in tests/*-tests.js; do
            echo "Running ${test_file}"
            node "$test_file"
          done

      - name: Commit formatted definition and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/format-lucifera.yml
          git rm .github/format-lucifera.py
          git rm .format-lucifera-trigger
          git add js/servants.js
          git commit -m 'Format Lucifera servant definition'
          git push origin HEAD:${{ github.head_ref }}
