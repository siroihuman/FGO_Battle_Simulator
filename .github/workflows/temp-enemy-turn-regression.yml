name: Temporary enemy turn regression

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: |
          node --check js/enemy-turn-charge-reserve-status.js
          node --check tests/enemy-turn-charge-reserve-status-tests.js
      - name: Run all regression tests and capture output
        id: regression
        shell: bash
        run: |
          status=0
          : > all-regression-output.txt
          for file in tests/*-tests.js; do
            echo "=== $file ===" | tee -a all-regression-output.txt
            node "$file" 2>&1 | tee -a all-regression-output.txt || status=$?
          done
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-regression-output
          path: all-regression-output.txt
      - name: Fail when regression tests failed
        if: always()
        run: test "${{ steps.regression.outputs.exit_code }}" = "0"
