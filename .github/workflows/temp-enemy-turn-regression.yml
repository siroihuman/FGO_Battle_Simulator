name: Temporary enemy turn regression

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: |
          node --check js/enemy-turn-charge-reserve-status.js
          node --check tests/enemy-turn-charge-reserve-status-tests.js
      - name: Run regression tests and capture output
        id: regression
        shell: bash
        run: |
          status=0
          {
            echo '=== enemy-turn-charge-reserve-status-tests ==='
            node tests/enemy-turn-charge-reserve-status-tests.js || status=$?
            echo '=== enemy-class-defaults-tests ==='
            node tests/enemy-class-defaults-tests.js || status=$?
            echo '=== enemy-action-defaults-tests ==='
            node tests/enemy-action-defaults-tests.js || status=$?
          } 2>&1 | tee enemy-turn-test-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enemy-turn-test-output
          path: enemy-turn-test-output.txt
      - name: Fail when regression tests failed
        if: always()
        run: test "${{ steps.regression.outputs.exit_code }}" = "0"
