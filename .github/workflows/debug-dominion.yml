name: Debug Dominion Foreigner

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  debug:
    if: github.head_ref == 'implement-dominion-foreigner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run full regression suite
        run: node tests/run-all.js > dominion-debug.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: dominion-debug
          path: dominion-debug.log
