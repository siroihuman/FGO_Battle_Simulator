name: Apply v1.3.4 patch

on:
  push:
    paths:
      - 'scripts/apply_v134_patch.py'
      - '.github/workflows/apply-v134.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply patch
        run: python scripts/apply_v134_patch.py
      - name: Syntax check
        run: |
          node -c js/engine.js
          node -c js/app.js
      - name: Regression tests
        run: |
          node tests/engine-tests.js
          node tests/damage-regression.js
          node tests/command-regression.js
      - name: Commit patched files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add js/engine.js js/app.js css/styles.css tests/command-regression.js
          git diff --cached --quiet || git commit -m 'Fix NP chains, order change UI, and mobile scroll'
          git push
