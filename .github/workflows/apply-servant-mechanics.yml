name: Apply servant mechanics architecture

on:
  push:
    paths:
      - 'tools/apply_servant_mechanics_patch.py'
      - '.github/workflows/apply-servant-mechanics.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply patch
        run: python tools/apply_servant_mechanics_patch.py
      - name: Run tests
        run: |
          node tests/engine-tests.js
          node tests/damage-regression.js
          node tests/servant-mechanics-tests.js
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/engine.js index.html README.md
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Add per-servant mechanics architecture"
            git push
          fi
