name: Eingana diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lethal damage evasion test
        run: node tests/lethal-damage-evasion-effects-tests.js
      - name: Capture Eingana test
        id: eingana
        shell: bash
        run: |
          set +e
          node tests/eingana-tests.js > eingana-output.txt 2>&1
          status=$?
          cat eingana-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload Eingana output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eingana-output
          path: eingana-output.txt
      - name: Fail on Eingana test failure
        run: test "${{ steps.eingana.outputs.exit_code }}" = "0"
      - name: Servant mechanics registry test
        run: node tests/servant-mechanics-tests.js
