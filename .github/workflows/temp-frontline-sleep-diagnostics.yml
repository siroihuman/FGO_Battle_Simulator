name: Temporary frontline sleep diagnostics

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run all regression tests
        id: regressions
        shell: bash
        run: |
          status=0
          {
            for file in tests/*-tests.js; do
              echo "=== $file ==="
              node "$file" || { status=$?; break; }
            done
          } > regression-output.txt 2>&1
          cat regression-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontline-sleep-output
          path: regression-output.txt
      - name: Fail when tests failed
        if: always()
        run: test "${{ steps.regressions.outputs.exit_code }}" = "0"
