name: Fetch Page 815 Common Crawl

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fetch:
    if: github.head_ref == 'implement-page-815'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch archived page
        run: python tmp/fetch-commoncrawl-page815.py
      - uses: actions/upload-artifact@v4
        with:
          name: page-815-commoncrawl
          path: page815-commoncrawl
