name: Beast No.031 Debug

on:
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Beast data
        run: BEAST_TEST_FILTER=data node tests/beast-031-tests.js
      - name: Party demerit
        run: BEAST_TEST_FILTER=demerit node tests/beast-031-tests.js
      - name: Skill 2
        run: BEAST_TEST_FILTER=skill2 node tests/beast-031-tests.js
      - name: Skill 3
        run: BEAST_TEST_FILTER=skill3 node tests/beast-031-tests.js
      - name: Hatred
        run: BEAST_TEST_FILTER=hatred node tests/beast-031-tests.js
      - name: Instant death
        run: BEAST_TEST_FILTER=death node tests/beast-031-tests.js
      - name: Unique registry regression
        run: node tests/servant-mechanics-tests.js
