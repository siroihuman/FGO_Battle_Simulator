name: Beast No.031 Debug

on:
  pull_request:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Beast regression
        run: node tests/beast-031-tests.js
      - name: Unique registry regression
        run: node tests/servant-mechanics-tests.js
