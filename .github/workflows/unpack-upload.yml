name: Unpack uploaded simulator

on:
  push:
    branches:
      - main
    paths:
      - 'FGO_Battle_Simulator_v1.2.3.zip'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand simulator archive
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="FGO_Battle_Simulator_v1.2.3.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "Archive is already expanded."
            exit 0
          fi
          rm -rf .upload-extracted
          mkdir .upload-extracted
          unzip -q "$ZIP_FILE" -d .upload-extracted
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            .upload-extracted/ ./
          rm -rf .upload-extracted
          rm -f "$ZIP_FILE"

      - name: Commit expanded project
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upload FGO Battle Simulator v1.2.3"
          git push
