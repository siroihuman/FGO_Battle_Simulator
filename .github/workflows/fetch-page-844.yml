name: Fetch Page 844

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          mkdir -p /tmp/page-fetch
          cd /tmp/page-fetch
          npm init -y
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Fetch atwiki page
        run: |
          cd /tmp/page-fetch
          cat > fetch.js <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/150 Safari/537.36'
            });
            await page.goto('https://w.atwiki.jp/siroi_human/pages/844.html', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });
            await page.waitForTimeout(5000);
            fs.writeFileSync('/tmp/page844.html', await page.content());
            fs.writeFileSync('/tmp/page844.txt', await page.locator('body').innerText());
            await page.screenshot({ path: '/tmp/page844.png', fullPage: true });
            console.log('TITLE=' + await page.title());
            console.log((await page.locator('body').innerText()).slice(0, 3000));
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          node fetch.js
      - name: Archive repository for audit
        run: |
          tar --exclude='.git' --exclude='.github/workflows/fetch-page-844.yml' -czf /tmp/repository-audit.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: page-844-audit
          path: |
            /tmp/page844.html
            /tmp/page844.txt
            /tmp/page844.png
            /tmp/repository-audit.tar.gz
