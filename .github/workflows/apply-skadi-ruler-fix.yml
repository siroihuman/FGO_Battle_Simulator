name: Diagnose Skadi Ruler Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-skadi-ruler-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run syntax and regression diagnostics
        id: verify
        shell: bash
        run: |
          set +e
          {
            echo '=== Syntax check ==='
            find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
            syntax_status=$?
            echo "syntax_status=$syntax_status"
            echo '=== Regression tests ==='
            test_status=0
            for file in tests/*-tests.js; do
              echo "=== $file ==="
              node "$file" || test_status=$?
            done
            echo "test_status=$test_status"
            if [ "$syntax_status" -eq 0 ] && [ "$test_status" -eq 0 ]; then
              echo 'verification_status=success'
              exit_code=0
            else
              echo 'verification_status=failure'
              exit_code=1
            fi
          } 2>&1 | tee skadi-ruler-verification.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit diagnostic log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skadi-ruler-verification.log
          git commit -m "Record Skadi Ruler verification result"
          git push
      - name: Fail when verification failed
        if: steps.verify.outputs.status != '0'
        run: exit 1
