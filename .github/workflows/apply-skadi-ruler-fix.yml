name: Verify Skadi Ruler Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-skadi-ruler-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Remove temporary migration tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-skadi-ruler-fix.js .github/workflows/apply-skadi-ruler-fix.yml
          git commit -m "Remove temporary Skadi Ruler migration tooling"
          git push
