name: Finalize Skadi Ruler Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-skadi-ruler-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Correct regression baselines
        run: |
          node scripts/apply-skadi-ruler-fix.js
          node scripts/fix-class-score-test-baselines-extra.js
      - name: Syntax check
        run: find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Commit corrections and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/inugami-gyobu-tests.js tests/koyanskaya-light-tests.js tests/yaoya-oshichi-tests.js tests/turn-field-effects-tests.js tests/skadi-ruler-tests.js
          git rm scripts/apply-skadi-ruler-fix.js scripts/fix-class-score-test-baselines-extra.js .github/workflows/apply-skadi-ruler-fix.yml skadi-ruler-verification.log
          git commit -m "Fix class score-aware regression tests and finalize Skadi Ruler"
          git push
