name: Verify servant list order

on:
  push:
    branches:
      - sort-servant-list-by-number

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check all JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find js tests -type f -name '*.js' -print0 | sort -z)
      - name: Run all regression tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in tests/*-tests.js; do
            echo "Running ${test_file}"
            node "$test_file"
          done
