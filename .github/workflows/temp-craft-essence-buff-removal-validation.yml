name: Temporary craft essence buff removal validation

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run all JavaScript regression tests
        shell: bash
        run: |
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
