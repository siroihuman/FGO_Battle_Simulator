name: Verify Rlyeh Fix

on:
  push:
    branches: [fix-rlyeh-skill-passive]

permissions:
  contents: write

jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-rlyeh-skill-passive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: node tests/run-all.js
      - name: Record success
        run: |
          printf 'Rlyeh fix verified at %s\n' "$GITHUB_SHA" > tests/.rlyeh-ci-passed
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/.rlyeh-ci-passed
          git commit -m "Record Rlyeh verification success"
          git push origin HEAD:fix-rlyeh-skill-passive
