name: Verify and commit Lucifera

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  implement-and-test:
    if: github.head_ref == 'implement-lucifera'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Run embedded Lucifera insertion script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/implement-lucifera.yml').read_text(encoding='utf-8')
          start = "          python - <<'PY'\n"
          end = "\n          PY"
          if start not in workflow:
              raise SystemExit('embedded implementation script start not found')
          block = workflow.split(start, 1)[1].split(end, 1)[0]
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(code, 'embedded-lucifera-implementation.py', 'exec'))

          test_path = Path('tests/lucifera-tests.js')
          test_text = test_path.read_text(encoding='utf-8')
          old = """  const [lucifera, koyanskaya, oshichi] = engine.getState().allies;
  oshichi.cooldowns = oshichi.cooldowns.map(() => 5);

  const result = engine.useSkill(lucifera.id, 0, oshichi.id);
  assert.strictEqual(result.ok, true);
  [lucifera, koyanskaya, oshichi].forEach((ally) => {
    assert.strictEqual(engine._statusTotal(ally, 'cardUp', { card: 'buster' }), 30);
    assert.strictEqual(engine._statusTotal(ally, 'attackUp'), 20);
  });"""
          new = """  const [lucifera, koyanskaya, oshichi] = engine.getState().allies;
  oshichi.cooldowns = oshichi.cooldowns.map(() => 5);
  const before = new Map([lucifera, koyanskaya, oshichi].map((ally) => [ally.id, {
    buster: engine._statusTotal(ally, 'cardUp', { card: 'buster' }),
    attack: engine._statusTotal(ally, 'attackUp')
  }]));

  const result = engine.useSkill(lucifera.id, 0, oshichi.id);
  assert.strictEqual(result.ok, true);
  [lucifera, koyanskaya, oshichi].forEach((ally) => {
    assert.strictEqual(engine._statusTotal(ally, 'cardUp', { card: 'buster' }) - before.get(ally.id).buster, 30);
    assert.strictEqual(engine._statusTotal(ally, 'attackUp') - before.get(ally.id).attack, 20);
  });"""
          if old not in test_text:
              raise SystemExit('Lucifera S1 assertion block not found')
          test_path.write_text(test_text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Check all JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find js tests -type f -name '*.js' -print0 | sort -z)

      - name: Run all regression tests
        shell: bash
        run: |
          set -euo pipefail
          for test_file in tests/*-tests.js; do
            echo "Running ${test_file}"
            node "$test_file"
          done

      - name: Commit implementation and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/implement-lucifera.yml
          git rm .github/workflows/verify-lucifera-pr.yml
          git rm .lucifera-workflow-trigger
          git add js/servants.js tests/lucifera-tests.js
          git commit -m 'Implement Lucifera servant data'
          git push origin HEAD:${{ github.head_ref }}
