name: Apply Rlyeh Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'implement-rlyeh'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement-rlyeh
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply UI and regression updates
        run: python tmp/apply-rlyeh-ui.py
      - name: Syntax check
        run: find js tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run Rlyeh regression tests
        run: node tests/rlyeh-tests.js
      - name: Run all regression tests
        run: node tests/run-all.js
      - name: Remove temporary files
        run: |
          rm -f .github/workflows/apply-rlyeh.yml
          rm -rf tmp
      - name: Commit formal changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Implement Rlyeh servant mechanics'
          git push origin HEAD:implement-rlyeh
