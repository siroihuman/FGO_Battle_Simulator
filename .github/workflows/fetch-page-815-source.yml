name: Fetch Page 815 Source

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fetch:
    if: github.head_ref == 'implement-page-815'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch source
        run: curl -L --max-time 90 -A 'Mozilla/5.0' 'https://w.atwiki.jp/siroi_human/?cmd=backup&action=source&pageid=815&num=0' -o page-815-source.html
      - uses: actions/upload-artifact@v4
        with:
          name: page-815-source
          path: page-815-source.html
