name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Skadi Caster migration
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          node scripts/apply-skadi-caster-fix.js
          node scripts/fix-combat-defense-test-isolation.js
      - name: Syntax check
        run: |
          find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Commit verified Skadi Caster changes to PR
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cat > .github/workflows/tests.yml <<'EOF'
          name: JavaScript Tests

          on:
            push:
              branches: ['**']
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              timeout-minutes: 5
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '22'
                - name: Syntax check
                  run: |
                    find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
                - name: Run all regression tests
                  run: |
                    set -e
                    for file in tests/*-tests.js; do
                      echo "=== $file ==="
                      node "$file"
                    done
          EOF
          sed -i 's/^          //' .github/workflows/tests.yml
          git rm -f --ignore-unmatch \
            scripts/apply-skadi-caster-fix.js \
            scripts/fix-combat-defense-test-isolation.js \
            skadi-caster-verification.log \
            skadi-caster-fix-trigger.txt
          git add js/servants.js tests/skadi-caster-tests.js tests/combat-defense-effects-tests.js .github/workflows/tests.yml
          git commit -m "Fix Skadi Caster servant data"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
