name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        case: ['基本データ', '花咲耶', '火避け', '木花一夜', '桜花爛漫', '前衛1騎']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run ${{ matrix.case }}
        env:
          TEST_ONLY: ${{ matrix.case }}
        run: |
          perl -0pi -e 's/function test\(name, fn\) \{/function test(name, fn) { if (process.env.TEST_ONLY \&\& !name.includes(process.env.TEST_ONLY)) return;/' tests/konohanasakuya-hime-tests.js
          node tests/konohanasakuya-hime-tests.js
