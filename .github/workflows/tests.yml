name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        check: [debuff, evade, arts, allynp, actornp, defense, focus]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check ${{ matrix.check }}
        env:
          CHECK: ${{ matrix.check }}
        run: node tests/konohana-diagnostic.js
