name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Alice Liddell migration
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: node scripts/apply-alice-liddell-fix.js
      - name: Syntax check
        run: |
          find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run Alice Liddell regression tests
        run: node tests/alice-liddell-tests.js
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Commit verified Alice Liddell data
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/servants.js
          git commit -m "Fix Alice Liddell servant data"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
