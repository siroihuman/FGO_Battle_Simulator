name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply data migration
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: node scripts/apply-juana-mad-queen-fix.js
      - name: Syntax check
        run: |
          find js tests scripts -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run common feature tests
        run: node tests/class-affinity-special-effects-tests.js
      - name: Run target data tests
        shell: bash
        run: |
          set +e
          node tests/juana-mad-queen-tests.js > target-test.log 2>&1
          status=$?
          cat target-test.log
          echo "$status" > /tmp/target-test-status
          exit 0
      - name: Record target failure
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          status=$(cat /tmp/target-test-status)
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f target-test.log
            git commit -m "Record target test failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Stop on target failure
        run: |
          status=$(cat /tmp/target-test-status)
          if [ "$status" -ne 0 ]; then exit "$status"; fi
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Commit verified data
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch target-test.log
          git add js/servants.js
          git commit -m "Update servant data"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
