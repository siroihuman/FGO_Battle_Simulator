name: JavaScript Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Skadi Caster migration
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: node scripts/apply-skadi-caster-fix.js
      - name: Syntax check
        run: |
          find js tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: |
          set -e
          for file in tests/*-tests.js; do
            echo "=== $file ==="
            node "$file"
          done
      - name: Commit verified Skadi Caster data and restore workflow
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show HEAD^:.github/workflows/tests.yml > .github/workflows/tests.yml
          git rm scripts/apply-skadi-caster-fix.js
          git add js/servants.js tests/skadi-caster-tests.js .github/workflows/tests.yml
          git commit -m "Fix Skadi Caster servant data"
          git push origin main
