name: Apply Baphomet Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix-baphomet-offering-icons'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-baphomet-offering-icons
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply source changes
        run: python tmp/apply-baphomet-source.py
      - name: Apply regression tests
        run: python tmp/apply-baphomet-tests.py
      - name: Syntax check
        run: find js tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: node tests/run-all.js
      - name: Remove temporary files
        run: |
          rm -f .github/workflows/export-fix-audit.yml
          rm -rf tmp
      - name: Commit formal changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix Baphomet offering and status icons'
          git push origin HEAD:fix-baphomet-offering-icons
