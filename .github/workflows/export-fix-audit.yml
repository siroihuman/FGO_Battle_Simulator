name: Apply Baphomet Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix-baphomet-offering-icons'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-baphomet-offering-icons
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply verified implementation
        run: |
          cat tmp/baphomet-fix.part00 tmp/baphomet-fix.part01 tmp/baphomet-fix.part02 tmp/baphomet-fix.part03 > /tmp/baphomet-fix.b64
          base64 --decode /tmp/baphomet-fix.b64 > /tmp/baphomet-fix.tar.gz
          echo '679bbfa5ae6b69ea399fea414a4be5ce4feae8ef19f8f1437bdff5670706c036  /tmp/baphomet-fix.tar.gz' | sha256sum --check
          tar -xzf /tmp/baphomet-fix.tar.gz -C .
      - name: Syntax check
        run: find js tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all regression tests
        run: node tests/run-all.js
      - name: Remove temporary files
        run: |
          rm -f .github/workflows/export-fix-audit.yml
          rm -f tmp/baphomet-fix.part00 tmp/baphomet-fix.part01 tmp/baphomet-fix.part02 tmp/baphomet-fix.part03
          rmdir tmp 2>/dev/null || true
      - name: Commit formal changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix Baphomet offering and status icons'
          git push origin HEAD:fix-baphomet-offering-icons
